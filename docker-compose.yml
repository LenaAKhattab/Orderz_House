services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://orderzhouse.com/api
    container_name: orderzhouse-frontend
    restart: unless-stopped
    ports:
      - "3006:3000"
    environment:
      - VITE_API_BASE_URL=https://orderzhouse.com/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orderzhouse-backend
    restart: unless-stopped
    ports:
      - "3007:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
      - CLIENT_URL=https://orderzhouse.com